<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>Weather App</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(to right, #dbeafe, #eff6ff);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .weather-card {
        width: 100%;
        max-width: 450px;
        border-radius: 20px;
        padding: 30px;
        background: white;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }

      .weather-title {
        font-weight: 700;
        text-align: center;
        margin-bottom: 20px;
      }

      .btn-weather {
        border-radius: 12px;
      }

      .form-control {
        border-radius: 12px;
        padding: 12px;
      }

      .temp-box {
        margin-top: 25px;
        text-align: center;
        background: #f8fafc;
        padding: 20px;
        border-radius: 15px;
      }

      .temp-text {
        font-size: 2rem;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="weather-card">
      <h2 class="weather-title"> Weather App</h2>

      <div class="input-group">
        <input
          type="text"
          id="cityName"
          class="form-control"
          placeholder="Enter city name"
        />

        <button
          class="btn btn-primary btn-weather px-4"
          onclick="getWeather()"
        >
          Search
        </button>
      </div>

      <div class="temp-box">
        <h5 class="text-muted">Temperature</h5>

        <div class="temp-text">
          <span id="Temperature">--</span>°C
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
