<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Converter</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-dark text-light">
    <div class="bg-primary text-white p-3 text-center shadow">
      <h1 class="m-0">Currency Converter</h1>
    </div>

    <main class="container mt-5">
      <div
        class="card bg-secondary text-light shadow-lg p-4 mx-auto"
        style="max-width: 700px"
      >
        <div class="row g-4">
          <div class="col-md-6 text-center">
            <h4>From Currency</h4>

            <div class="dropdown mt-3">
              <button
                class="btn btn-light dropdown-toggle w-100"
                type="button"
                id="country1"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                Select Currency
              </button>

              <div class="dropdown-menu w-100" id="countryCode1"></div>
            </div>
          </div>

          <div class="col-md-6 text-center">
            <h4>To Currency</h4>

            <div class="dropdown mt-3">
              <button
                class="btn btn-light dropdown-toggle w-100"
                type="button"
                id="country2"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                Select Currency
              </button>

              <div class="dropdown-menu w-100" id="countryCode2"></div>
            </div>
          </div>
        </div>

        <div class="mt-4">
          <label class="form-label" for="amountInput">Enter Amount</label>

          <input
            id="amountInput"
            type="number"
            class="form-control"
            placeholder="Enter amount"
            min="1"
          />
        </div>

        <div class="mt-4 d-grid">
          <button id="convertBtn" class="btn btn-primary btn-lg" type="button">
            Convert Currency
          </button>
        </div>

        <div class="text-center mt-4">
          <h4>Converted Amount</h4>
          <h2 id="resultOutput" class="fw-bold text-white">--</h2>
        </div>
      </div>
    </main>

    <script src="script.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
