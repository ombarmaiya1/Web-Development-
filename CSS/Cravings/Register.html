<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Page</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="Register.css">
  </head>
<body>
    
   <div id="navbar" class=" d-flex  ">
     <div>
<img src="images/image.png" id="main_logo" class="ms-5" alt="" />     </div>

      <div id="login_Register_button" class="mt-3 me-4">
       <button class="btn LoginButton text-light mx-2"><a href="Login.html">Login</a></button>

        <button class="btn RegButton mx-2"><a href="Register.html">Register</a></button>
      </div>
    </div>




    <div class="RegisterOuter">

       <!-- <div> <img src="foodbg.png" alt=""></div> -->
       <div class="RegisterBox">

       

        <div>
            <h2 class="Register_Heading text-center">Create Account</h2>
            <p class="text-dark text-center">Join us as a Customer, Restaurant, or Rider</p>
        </div>

        <div class="ms-3">

            <div>
                <h6>Register as:</h6>
            </div>
            <div class="d-flex gap-4">
                <div>
                    <input type="radio" id="customer" name="user">
                    <label for="customer">Customer</label>
                </div>

                <div>
                    <input type="radio" id="restaurant" name="user">
                    <label for="customer">Restaurant</label>
                </div>

                <div>
                    <input type="radio" id="rider" name="user">
                    <label for="customer">Rider</label>
                </div>
            </div>
            
        </div>

       <div class="RegisterField">
            
            <input id ="name" type="text" placeholder="Enter your full name" >
        </div>

       <div class="RegisterField">
            
            <input id ="mail" type="email" placeholder="Enter your email" >
        </div>

        <div class="RegisterField">
            
            <input id ="phone" type="number" placeholder="Enter your phone number" >
        </div>

        <div class="RegisterField">
            
            <input id="password" type="password" placeholder="Enter your password">
        </div>

        <div class="RegisterField">
            
            <input id="confirmpassword" type="password" placeholder="Confirm your password">
        </div>


        <div class="loginField" id="Remember_ForgotPass">
            <div>
                <input type="checkbox" id="checkbox">
                <label for="checkbox">I agree to the <a href="#" class="RegistrationTandC">terms and conditions.</a></label>
            </div>
        </div>    

        <div class="loginField">
            <button class="login_button">Register</button>
        </div>

        <div>

        </div>

        <div class="d-flex justify-content-center">
            <p>
                Already regsitered?<a href="#" class="PrimaryColourText text-decoration-none ">Login here</a>
            </p>
            
        </div>

        </div>
    </div>

  



    
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
