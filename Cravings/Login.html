<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
  </head>
<body>
    
   <div id="navbar" class=" d-flex  ">
     <div>
         <img src="image.png" id="main_logo" class="ms-5" alt="" />
     </div>

      <div id="login_Register_button" class="mt-3 me-4">
        <button class="btn LoginButton text-light mx-2">Login</button>

        <button class="btn RegButton mx-2">Register</button>
      </div>
    </div>




    <div class="loginOuter">

       <!-- <div> <img src="foodbg.png" alt=""></div> -->
       <div class="loginBox">

       

       <div>
        <h2 class="Login_Heading text-center">Welcome Back</h2>
       <p class="text-dark text-center">Login to your Cravings account</p>
       </div>

       <div class="loginField">
            <label for="Emailbox" class="fw-bold">Email</label>
            <br>
            <input id ="Emailbox" type="email" placeholder="Enter your email" >
        </div>

        <div class="loginField">
            <label for="Passwordbox" class="fw-bold">Password</label>
            <br>
            <input id="Passwordbox" type="password" placeholder="Enter your password">
        </div>

        <div class="loginField" id="Remember_ForgotPass">
            <div>
                <input type="checkbox" id="checkbox">
                <label for="checkbox">Remember me</label>
            </div>

            <div>
                <a href="#" class="text-decoration-none PrimaryColourText">Forgot Password?</a>
            </div>
        </div>

        <div class="loginField">
            <button class="login_button">Login</button>
        </div>

        <div>

        </div>

        <div class="d-flex justify-content-center">
            <a href="#" class="PrimaryColourText text-decoration-none ">Create an account</a>
        </div>

        </div>
    </div>

  



    
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
