<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=\, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <header>
      <div class="container">
        <div class="logo"><img src="/enquiryPage/logo-2.png" alt="logo" /></div>
        <div class="navlinks">
          <div class="links">Home</div>
          <div class="links">About</div>
          <div class="links">Courses</div>
          <div class="links">IDE</div>
          <div class="links">Contact US</div>
        </div>
        <div class="contact">
          <div class="no"></div>
          <div class="button"></div>
        </div>
      </div>
    </header>

    <main>
      <div class="container">
        <div class="form">
          <div class="heading"><h1>Enquiry Form</h1></div>
          <div>
            <p>
              Have questions or need assistance? Fill out the form below to
              connect with our team and explore your opportunities.
            </p>
          </div>

          <div class="inputs">
            <div class="form-details">
              <label for="">Person Name*</label
              ><input type="text" placeholder="Person Name" />
            </div>

            <div class="form-details">
              <label for="">Contact Number*</label
              ><input type="text" placeholder="Contact Number" />
            </div>
            <div class="form-details">
              <label for="">Email*</label
              ><input type="text" placeholder="Email*" />
            </div>
            <div class="form-details">
              <label for="">Qulifications*</label
              ><input type="text" placeholder="Qualifications" />
            </div>
            <div class="form-details" id="college">
              <label for="">College/School Name*</label
              ><input type="text" placeholder="College/School Name" />
            </div>
            <div class="form-details">
              <label for="">Year*</label
              ><input type="text" placeholder="Year" />
            </div>
            <div class="form-details">
              <label for="">Branch*</label
              ><input type="text" placeholder="Branch" />
            </div>
          </div>
          <div class="others">
            <div class="checkbox">
              <p>Interested in Which Course*</p>
              <input type="checkbox"  />
              <input type="checkbox" />
              <input type="checkbox" />
              <input type="checkbox" />
              <input type="checkbox" />
              <input type="checkbox" />
              <input type="checkbox" />
              <input type="checkbox" />
            </div>
            <div class="select"></div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
